<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Details | Medix</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    #list {
      display: grid;
      gap: 18px;
      margin-top: 24px;
    }

    .doctor {
      display: grid;
      grid-template-columns: auto 1fr auto;
      grid-gap: 20px;
      align-items: center;
      padding: 24px;
      border: none;
      border-radius: 18px;
      background: linear-gradient(135deg, #ffffff 0%, #f8f9fb 100%);
      box-shadow: 0 4px 20px rgba(13, 110, 253, 0.08), 0 1px 3px rgba(0, 0, 0, 0.05);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 4px solid #0d6efd;
      position: relative;
      overflow: hidden;
    }

    .doctor::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 100px;
      height: 100px;
      background: radial-gradient(circle, rgba(13, 110, 253, 0.08) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .doctor:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 30px rgba(13, 110, 253, 0.15), 0 4px 8px rgba(0, 0, 0, 0.08);
      border-left-color: #0b5ed7;
    }

    .doctor .avatar {
      width: 72px;
      height: 72px;
      min-width: 72px;
      border-radius: 16px;
      background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(13, 110, 253, 0.35);
      transition: transform 0.3s ease;
      position: relative;
      z-index: 1;
    }

    .doctor:hover .avatar {
      transform: scale(1.08) rotateY(5deg);
    }

    .doctor .left {
      display: grid;
      gap: 8px;
      min-width: 0;
      position: relative;
      z-index: 1;
    }

    .doctor .left > b {
      font-size: 17px;
      font-weight: 700;
      color: #0a1428;
      letter-spacing: -0.3px;
      margin: 0;
    }

    .doctor .left > div {
      font-size: 13px;
      color: #6c757d;
      margin: 0;
      font-weight: 500;
    }

    .doctor .spec {
      display: inline-block;
      padding: 4px 12px;
      background: linear-gradient(135deg, rgba(13, 110, 253, 0.12), rgba(11, 94, 215, 0.08));
      color: #0d6efd;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      width: fit-content;
    }

    .doctor .rating {
      color: #ff9800;
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .doctor .btn {
      padding: 12px 28px;
      background: linear-gradient(135deg, #0d6efd 0%, #0b5ed7 100%);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 700;
      font-size: 14px;
      white-space: nowrap;
      transition: all 0.3s ease;
      position: relative;
      z-index: 1;
      box-shadow: 0 6px 16px rgba(13, 110, 253, 0.3);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .doctor .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 24px rgba(13, 110, 253, 0.4);
      background: linear-gradient(135deg, #0b5ed7 0%, #0949b8 100%);
    }

    .doctor .btn:active {
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .doctor {
        grid-template-columns: auto 1fr;
        gap: 16px;
        padding: 18px;
      }

      .doctor .btn {
        grid-column: 1 / -1;
        width: 100%;
      }
    }

    /* BOOKING MODAL */
    .booking-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .booking-modal.active {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .booking-modal-content {
      background: linear-gradient(135deg, #fff 0%, #f5f9fa 100%);
      border-radius: 28px;
      padding: 0;
      max-width: 520px;
      width: 100%;
      box-shadow: 0 25px 80px rgba(11, 79, 89, 0.25);
      animation: slideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      border: 1px solid rgba(199, 155, 92, 0.2);
      overflow: hidden;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .booking-modal-header {
      background: linear-gradient(135deg, #0f6f79 0%, #0b4f59 100%);
      padding: 32px 32px 20px;
      color: white;
      position: relative;
      overflow: hidden;
    }

    .booking-modal-header::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(199, 155, 92, 0.2) 0%, transparent 70%);
      border-radius: 50%;
    }

    .booking-modal-header h3 {
      font-size: 26px;
      font-weight: 800;
      margin: 0 0 4px 0;
      position: relative;
      z-index: 1;
      letter-spacing: -0.5px;
    }

    .booking-modal-header p {
      color: rgba(255, 255, 255, 0.9);
      margin: 0;
      font-size: 14px;
      position: relative;
      z-index: 1;
      font-weight: 500;
    }

    .booking-modal-body {
      padding: 32px;
    }

    .booking-modal-doctor {
      background: linear-gradient(135deg, rgba(15, 111, 121, 0.08), rgba(199, 155, 92, 0.06));
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 28px;
      border-left: 4px solid #0f6f79;
      position: relative;
    }

    .booking-modal-doctor::after {
      content: '';
      position: absolute;
      top: -1px;
      right: -1px;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(199, 155, 92, 0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    .booking-modal-doctor b {
      display: block;
      color: #0b4f59;
      font-weight: 700;
      margin-bottom: 8px;
      font-size: 17px;
      position: relative;
      z-index: 1;
    }

    .booking-modal-doctor span {
      color: #6c757d;
      font-size: 13px;
      position: relative;
      z-index: 1;
      display: block;
      line-height: 1.5;
    }

    .booking-form {
      display: grid;
      gap: 20px;
    }

    .form-group {
      display: grid;
      gap: 10px;
    }

    .form-group label {
      font-weight: 700;
      color: #0b4f59;
      font-size: 14px;
      letter-spacing: 0.3px;
      text-transform: uppercase;
    }

    .form-group input,
    .form-group select {
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.3s ease;
      background: white;
      font-weight: 500;
    }

    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #0f6f79;
      background: #fafbfc;
      box-shadow: 0 0 0 4px rgba(15, 111, 121, 0.12);
    }

    .booking-modal-footer {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      padding: 0 32px 32px;
    }

    .booking-modal-footer button {
      padding: 14px 24px;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      font-size: 14px;
      letter-spacing: 0.5px;
    }

    .btn-cancel {
      background: #f0f2f5;
      color: #0b4f59;
      border: 2px solid #e0e0e0;
    }

    .btn-cancel:hover {
      background: #e0e0e0;
      border-color: #0b4f59;
      transform: translateY(-2px);
    }

    .btn-confirm {
      background: linear-gradient(135deg, #0f6f79 0%, #0b4f59 100%);
      color: white;
      box-shadow: 0 8px 24px rgba(11, 79, 89, 0.3);
      position: relative;
      overflow: hidden;
    }

    .btn-confirm::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(199, 155, 92, 0.4), transparent);
      transition: left 0.5s;
    }

    .btn-confirm:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(11, 79, 89, 0.4);
    }

    .btn-confirm:active {
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .booking-modal-content {
        max-width: 100%;
        border-radius: 24px;
      }

      .booking-modal-body {
        padding: 24px;
      }

      .booking-modal-footer {
        padding: 0 24px 24px;
      }

      .booking-modal-header {
        padding: 24px 24px 16px;
      }
    }

    /* CONSULTATION TYPE */
    .consultation-type {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 20px;
    }

    .consultation-option {
      position: relative;
      cursor: pointer;
    }

    .consultation-option input[type="radio"] {
      display: none;
    }

    .consultation-label {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 14px;
      background: white;
      transition: all 0.3s ease;
      cursor: pointer;
      text-align: center;
    }

    .consultation-option input[type="radio"]:checked + .consultation-label {
      border-color: #0f6f79;
      background: linear-gradient(135deg, rgba(15, 111, 121, 0.08), rgba(199, 155, 92, 0.06));
      box-shadow: 0 4px 12px rgba(15, 111, 121, 0.15);
    }

    .consultation-label:hover {
      border-color: #0f6f79;
      background: #f9fafb;
    }

    .consultation-icon {
      font-size: 28px;
      line-height: 1;
    }

    .consultation-text {
      font-weight: 700;
      color: #0b4f59;
      font-size: 14px;
    }

    .consultation-option input[type="radio"]:checked + .consultation-label .consultation-text {
      color: #0f6f79;
    }

    .consultation-desc {
      font-size: 11px;
      color: #6c757d;
      margin-top: 2px;
    }
  </style>
</head>
<body data-page="hospitals">
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="app-main">
      <div class="app-main-inner">
        <header class="topbar" data-topbar></header>
        <main id="doctorDetail" class="stack">
          <div class="container">
            <h2 id="title">Doctors</h2>
          
            <!-- CATEGORY FILTER -->
            <select id="categoryFilter" onchange="displayDoctors()">
              <option value="all">All Categories</option>
              <option value="Cardiologist">Cardiologist</option>
              <option value="Dermatologist">Dermatologist</option>
              <option value="Pediatrician">Pediatrician</option>
              <option value="Orthopedic">Orthopedic</option>
              <option value="ENT">ENT</option>
              <option value="Neurologist">Neurologist</option>
              <option value="Psychiatrist">Psychiatrist</option>
              <option value="Gynecologist">Gynecologist</option>
              <option value="Oncologist">Oncologist</option>
              <option value="Radiologist">Radiologist</option>
            </select>
          
            <div id="list"></div>
          </div>
        </main>
      </div>
    </div>
  </div>
  
<!-- BOOKING MODAL -->
  <div class="booking-modal" id="bookingModal">
    <div class="booking-modal-content">
      <div class="booking-modal-header">
        <h3>Book an Appointment</h3>
        <p>Select a date and time slot</p>
      </div>

      <div class="booking-modal-body">
        <div class="booking-modal-doctor" id="doctorInfo"></div>

        <form class="booking-form" id="bookingForm" onsubmit="submitBooking(event)">
          <div class="form-group">
            <label style="margin-bottom: 12px; display: block;">Consultation Type</label>
            <div class="consultation-type">
              <div class="consultation-option">
                <input type="radio" id="inPerson" name="consultationType" value="In-Person" checked />
                <label for="inPerson" class="consultation-label">
                  <div class="consultation-icon">🏥</div>
                  <div class="consultation-text">In-Person</div>
                  <div class="consultation-desc">Visit clinic</div>
                </label>
              </div>
              <div class="consultation-option">
                <input type="radio" id="video" name="consultationType" value="Video Call" />
                <label for="video" class="consultation-label">
                  <div class="consultation-icon">📹</div>
                  <div class="consultation-text">Video Call</div>
                  <div class="consultation-desc">Online consult</div>
                </label>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label>Select Date</label>
            <input type="date" id="appointmentDate" required />
          </div>

          <div class="form-group">
            <label>Select Time</label>
            <select id="appointmentTime" required>
              <option value="">Choose a time slot</option>
              <option value="09:00 AM">09:00 AM</option>
              <option value="10:00 AM">10:00 AM</option>
              <option value="11:00 AM">11:00 AM</option>
              <option value="02:00 PM">02:00 PM</option>
              <option value="03:00 PM">03:00 PM</option>
              <option value="04:00 PM">04:00 PM</option>
            </select>
          </div>

          <div class="booking-modal-footer">
            <button type="button" class="btn-cancel" onclick="closeBookingModal()">Cancel</button>
            <button type="submit" class="btn-confirm">Confirm Booking</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Initialize app shell with sidebar and topbar
    window.SmartHealth.initializeAppShell({
      pageId: 'hospitals',
      title: 'Doctor Details',
      description: 'Browse and book appointments with doctors at selected hospital.',
    });
  </script>

  <script>
  
  // GET HOSPITAL
  let hospital = JSON.parse(localStorage.getItem("hospital"));
  document.getElementById("title").innerText =
    hospital ? "Doctors at " + hospital.name : "Doctors";
  
  // GENERATE DOCTORS
  function generateDoctors(name) {
  
    let first = [
      "Amit","Neha","Raj","Priya","Karan","Anjali","Rohit","Vikas","Pooja","Arjun",
      "Sneha","Rahul","Simran","Manish","Kriti","Deepak","Meera","Varun","Nisha","Yash"
    ];
  
    let last = [
      "Sharma","Verma","Gupta","Singh","Kapoor","Mehta","Bansal","Malhotra","Jain","Agarwal"
    ];
  
    let specs = [
      "Cardiologist","Dermatologist","Pediatrician","Orthopedic","ENT",
      "Neurologist","Psychiatrist","Gynecologist","Oncologist","Radiologist"
    ];
  
    let doctors = [];
    let used = new Set();
  
    let seed = 0;
    for (let i = 0; i < name.length; i++) seed += name.charCodeAt(i);
  
    function rand(n) {
      let x = Math.sin(seed + n) * 10000;
      return x - Math.floor(x);
    }
  
    let i = 0;
  
    while (doctors.length < 30) {
  
      let r1 = rand(i);
      let r2 = rand(i+50);
  
      let fullname = "Dr. " +
        first[Math.floor(r1 * first.length)] + " " +
        last[Math.floor(r2 * last.length)];
  
      if (used.has(fullname)) {
        i++;
        continue;
      }
  
      used.add(fullname);
  
      doctors.push({
        name: fullname,
        spec: specs[Math.floor(r1 * specs.length)],
        exp: Math.floor(r2 * 25) + 1,
        rating: (3 + r1 * 2).toFixed(1)
      });
  
      i++;
    }
  
    return doctors;
  }
  
  // DISPLAY + FILTER
  function displayDoctors() {
  
    if (!hospital) {
      document.getElementById("list").innerHTML = '<p style="color: #666;">No hospital selected. Please select a hospital first.</p>';
      return;
    }

    let doctors = generateDoctors(hospital.name);
  
    let selected = document.getElementById("categoryFilter").value;
  
    if (selected !== "all") {
      doctors = doctors.filter(d => d.spec === selected);
    }
  
    let html = "";
  
    doctors.forEach(d => {
      html += `
        <div class="doctor">
          <div class="avatar">${d.name.charAt(4)}</div>
          <div class="left">
            <b>${d.name}</b>
            <span class="spec">${d.spec}</span>
            <div>${d.exp} yrs exp</div>
            <div class="rating">⭐ ${d.rating}</div>
          </div>
          <button class="btn" onclick="bookDoctor('${encodeURIComponent(JSON.stringify(d))}')">Book</button>
        </div>
      `;
    });
  
    document.getElementById("list").innerHTML = html;
  }
  
  // REDIRECT
  function bookDoctor(doctorJson) {
    const doctor = JSON.parse(decodeURIComponent(doctorJson));
    const modal = document.getElementById("bookingModal");
    const doctorInfo = document.getElementById("doctorInfo");
    
    // Store current doctor in a global variable
    window.currentDoctor = doctor;
    
    // Display doctor info in modal
    doctorInfo.innerHTML = `
      <b>${doctor.name}</b>
      <span>${doctor.spec} • ${doctor.exp} yrs exp • ⭐ ${doctor.rating}</span>
    `;
    
    // Set minimum date to today
    const today = new Date().toISOString().split('T')[0];
    document.getElementById("appointmentDate").min = today;
    document.getElementById("appointmentDate").value = '';
    document.getElementById("appointmentTime").value = '';
    
    // Open modal
    modal.classList.add("active");
  }
  
  function closeBookingModal() {
    document.getElementById("bookingModal").classList.remove("active");
  }
  
  // SUBMIT BOOKING
  function submitBooking(e) {
    e.preventDefault();
    
    const date = document.getElementById("appointmentDate").value;
    const time = document.getElementById("appointmentTime").value;
    const consultationType = document.querySelector('input[name="consultationType"]:checked').value;
    const doctor = window.currentDoctor;
    
    if (!date || !time) {
      alert("Please select both date and time");
      return;
    }
    
    let appointment = {
      id: Date.now(),
      doctor: doctor.name,
      specialty: doctor.spec,
      rating: doctor.rating,
      experience: doctor.exp,
      hospital: hospital ? hospital.name : "Unknown Hospital",
      date: date,
      time: time,
      consultationType: consultationType,
      status: "Confirmed"
    };
    
    let appointments = JSON.parse(localStorage.getItem("appointments")) || [];
    appointments.push(appointment);
    localStorage.setItem("appointments", JSON.stringify(appointments));
    
    alert("✅ Appointment Booked Successfully!");
    closeBookingModal();
    window.location.href = "appointments.html";
  }
  
  // CLOSE MODAL ON BACKGROUND CLICK
  document.addEventListener("DOMContentLoaded", function() {
    const modal = document.getElementById("bookingModal");
    modal.onclick = function(e) {
      if (e.target === modal) {
        closeBookingModal();
      }
    };
  });
  
  // INITIAL LOAD
  displayDoctors();
  
  </script>
  
  </body>
  </html>
