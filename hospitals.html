<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospital Finder | Medix</title>
  <link rel="stylesheet" href="css/styles.css" />
  <style>
    /* HERO */
    .hero-banner{
      height:0;
      border-radius:30px;
      overflow:hidden;
      position:relative;
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.45);
      padding:60px;
      display:flex;
      flex-direction:column;
      justify-content:center;
      color:white;
    }

    .hero-overlay h1{
      font-size:72px;
      margin-bottom:14px;
    }

    .hero-overlay p{
      font-size:22px;
    }

    /* MAP */
    .map-container{
      position:relative;
      margin-top:24px;
    }

    #map{
      width:100%;
      height:500px;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 8px 20px rgba(0,0,0,0.12);
    }

    /* CONTROLS */
    .controls{
      display:flex;
      gap:14px;
      flex-wrap:wrap;
      margin-top:24px;
    }

    .controls input{
      flex:1;
      min-width:220px;
      padding:14px;
      border:none;
      border-radius:14px;
      background:white;
      outline:none;
      font-size:15px;
      box-shadow:0 4px 10px rgba(0,0,0,0.05);
    }

    .controls button{
      padding:14px 20px;
      border:none;
      background:#0d6efd;
      color:white;
      border-radius:14px;
      cursor:pointer;
      font-size:15px;
    }

    /* HOSPITAL CARD */
    .hospital{
      padding:18px;
      border:1px solid #eee;
      border-radius:18px;
      margin-bottom:16px;
      cursor:pointer;
      transition:0.3s;
      background:white;
    }

    .hospital:hover{
      background:#eef5ff;
      transform:translateY(-2px);
    }

    .hospital h4{
      color:#0d6efd;
      margin-bottom:8px;
    }

    .hospital p{
      color:#666;
      font-size:14px;
      margin-bottom:4px;
    }

    /* PARALLEL LAYOUT */
    .map-hospital-container{
      display:grid;
      grid-template-columns:0.8fr 1.2fr;
      gap:24px;
      align-items:start;
      margin-top:24px;
    }

    .hospital-list-wrapper{
      display:flex;
      flex-direction:column;
      height:600px;
      border-radius:24px;
      overflow:hidden;
      background:white;
      border:1px solid #eee;
      box-shadow:0 4px 16px rgba(0,0,0,0.06);
    }

    .hospital-list-header{
      padding:20px;
      border-bottom:1px solid #eee;
      background:linear-gradient(135deg, rgba(15, 111, 121, 0.03), rgba(45, 212, 191, 0.03));
    }

    .hospital-list-header h2{
      margin:0;
      font-size:20px;
      color:#0f6f79;
      font-weight:700;
    }

    .hospital-list-content{
      flex:1;
      overflow-y:auto;
      padding:0;
    }

    .map-container{
      position:relative;
      border-radius:24px;
      overflow:hidden;
      box-shadow:0 12px 32px rgba(0,0,0,0.1);
      height:600px;
    }

    #map{
      width:100%;
      height:100%;
    }

    /* SCROLLBAR */
    .hospital-list-content::-webkit-scrollbar{
      width:8px;
    }

    .hospital-list-content::-webkit-scrollbar-track{
      background:#f1f1f1;
      border-radius:10px;
    }

    .hospital-list-content::-webkit-scrollbar-thumb{
      background:#2dd4bf;
      border-radius:10px;
    }

    .hospital-list-content::-webkit-scrollbar-thumb:hover{
      background:#06b6d4;
    }

    /* RESPONSIVE */
    @media (max-width:1120px){
      .map-hospital-container{
        grid-template-columns:1fr;
        gap:20px;
      }

      .map-container,
      .hospital-list-wrapper{
        height:500px;
      }
    }

    @media (max-width:768px){
      .map-container,
      .hospital-list-wrapper{
        height:400px;
      }
    }
  </style>
</head>

<body data-page="hospitals">
  <div class="app-shell">
    <aside class="sidebar" data-sidebar></aside>
    <div class="app-main">
      <div class="app-main-inner">
        <header class="topbar" data-topbar></header>
        <main class="stack">

          <!-- HERO -->
          <section class="hero-banner">
            <div class="hero-overlay">
            </div>
          </section>

          <!-- CONTROLS -->
          <div class="controls">
            <input type="text" id="cityInput" placeholder="Enter city..." />
            <button onclick="searchCity()">Search City</button>
            <input type="text" id="hospitalSearch" placeholder="Search hospital..." />
          </div>

          <!-- PARALLEL LAYOUT: HOSPITAL LIST + MAP -->
          <div class="map-hospital-container">
            <!-- HOSPITAL LIST -->
            <div class="hospital-list-wrapper">
              <div class="hospital-list-header">
                <h2>🏥 Hospitals</h2>
              </div>
              <div class="hospital-list-content" id="hospitalList">
                Loading hospitals...
              </div>
            </div>

            <!-- MAP -->
            <div class="map-container">
              <div id="map"></div>
            </div>
          </div>
        </main>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    // Initialize app shell with sidebar and topbar
    window.SmartHealth.initializeAppShell({
      pageId: 'hospitals',
      title: 'Hospital Finder',
      description: 'Search nearby hospitals and explore hospital details instantly.',
    });
  </script>

  <script>
    let map, service, userLocation;
    let markers = [];
    let allHospitals = [];

    // INIT MAP
    function initMap(lat, lon){
      if(!lat || !lon){
        navigator.geolocation.getCurrentPosition(
          pos => {
            initMap(
              pos.coords.latitude,
              pos.coords.longitude
            );
          },
          () => {
            initMap(
              30.5157742,
              76.6590336
            );
          }
        );
        return;
      }

      userLocation =
        new google.maps.LatLng(lat, lon);

      map =
        new google.maps.Map(
          document.getElementById("map"),
          {
            center:userLocation,
            zoom:14
          }
        );

      service =
        new google.maps.places.PlacesService(map);

      loadHospitals();
    }

    // LOAD HOSPITALS
    function loadHospitals(){
      let request = {
        location:userLocation,
        radius:10000,
        keyword:"hospital"
      };

      service.nearbySearch(
        request,
        (results, status) => {
          if(
            status !==
            google.maps.places.PlacesServiceStatus.OK
          ) return;

          allHospitals = results.map(place => ({
            name:place.name,
            lat:place.geometry.location.lat(),
            lon:place.geometry.location.lng(),
            address:
              place.vicinity ||
              "Address unavailable"
          }));

          displayHospitals(allHospitals);
        }
      );
    }

    // DISPLAY
    function displayHospitals(hospitals){
      markers.forEach(
        m => m.setMap(null)
      );

      markers = [];

      let html = "";

      hospitals.forEach(h => {
        let marker =
          new google.maps.Marker({
            position:{
              lat:h.lat,
              lng:h.lon
            },
            map:map,
            title:h.name
          });

        marker.addListener(
          "click",
          () => selectHospital(h)
        );

        markers.push(marker);

        html += `
          <div
            class="hospital"
            onclick='selectHospital(decodeURIComponent("${encodeURIComponent(JSON.stringify(h))}"))'
          >
            <h4>${h.name}</h4>
            <p>${h.address}</p>
            <p>Click to view hospital details</p>
          </div>
        `;
      });

      document
      .getElementById("hospitalList")
      .innerHTML = html;
    }

    // SEARCH FILTER
    document
    .getElementById("hospitalSearch")
    .addEventListener("input", function(){
      let search =
        this.value.toLowerCase();

      let filtered =
        allHospitals.filter(h =>
          h.name
          .toLowerCase()
          .includes(search)
        );

      displayHospitals(filtered);
    });

    // SELECT HOSPITAL
    function selectHospital(hospital){
      if (typeof hospital === 'string') {
        hospital = JSON.parse(hospital);
      }
      localStorage.setItem(
        "hospital",
        JSON.stringify(hospital)
      );

      window.location.href =
        "doctor.html";
    }

    // SEARCH CITY
    function searchCity(){
      let city =
        document.getElementById("cityInput").value;

      if(!city)
        return alert("Enter a city");

      const geocoder =
        new google.maps.Geocoder();

      geocoder.geocode(
        { address: city },
        (results, status) => {
          if(status === "OK"){
            let loc =
              results[0].geometry.location;

            map.setCenter(loc);
            map.setZoom(13);
            userLocation = loc;
            loadHospitals();
          }
        }
      );
    }
  </script>

  <!-- GOOGLE MAP -->
  <script async
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAgwwQq9PhDo4PTeDLvmyUt2Irave7-FkQ&libraries=places&callback=initMap">
  </script>

</body>
</html>
